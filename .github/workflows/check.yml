name: Check monitored sources

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:
    inputs:
      test_source:
        description: 'Источник для одного реального тестового уведомления'
        required: false
        default: none
        type: choice
        options:
          - none
          - bitget-candybomb-current
          - bitget-launchpool
          - bitget-home-promotions
          - bitget-support-promotions
    test_article:
      description: 'Конкретная реальная статья Bitget для теста (только хаб поддержки)'
      required: false
      default: none
      type: choice
      options:
        - none
        - polyx-maintenance

permissions:
  contents: read

concurrency:
  group: telegram-monitor-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect events
        env:
          TEST_SOURCE: ${{ inputs.test_source || 'none' }}
          TEST_ARTICLE_ID: ${{ inputs.test_article == 'polyx-maintenance' && '12560603890046' || '' }}
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
        run: node scripts/collect.js > /tmp/events.json
      - name: Trigger protected Vercel endpoint
        env:
          CHECK_URL: ${{ secrets.VERCEL_CHECK_URL }}
          CHECK_SECRET: ${{ secrets.CHECK_SECRET }}
        run: |
          test -n "$CHECK_URL"
          test -n "$CHECK_SECRET"
          curl --fail-with-body --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $CHECK_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/events.json \
            "$CHECK_URL"
